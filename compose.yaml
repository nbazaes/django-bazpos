services:
  db:
    image: mariadb:12
    container_name: bazpos_db
    environment:
      MYSQL_ROOT_PASSWORD: 'Eowk5Ny6FA=='
      MYSQL_DATABASE: 'bazpos_db'
      MYSQL_USER: 'bazpos'
      MYSQL_PASSWORD: 'BazPOS!2025'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    container_name: bazpos_app
    build: .
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    environment:
      - DJANGO_SECRET_KEY=django-insecure-default-key-for-dev
      - DB_PASSWORD=BazPOS!2025
      - DB_HOST=db
      - DB_USER=bazpos
      - DB_NAME=bazpos_db
      - ADMIN_USER=admin
      - ADMIN_EMAIL=admin@bazaes.cl
      - ADMIN_PASS=admin123
    depends_on:
      db:
        condition: service_healthy
    command:
      sh -c "
        echo '---Esperando la Base de Datos... ---' &&
        echo '--- Ejecutando migraciones... ---' &&
        python manage.py migrate --noinput &&
        echo '--- Configurando grupos y permisos... ---' &&
        python manage.py setup_groups &&
        echo '--- Creando superusuario (si no existe)... ---' &&
        python manage.py create_admin &&
        echo '--- Recolectando archivos estáticos... ---' &&
        python manage.py collectstatic --no-input &&
        echo '--- Iniciando Gunicorn... ---' &&
        gunicorn --bind 0.0.0.0:8000 bazpos.wsgi:application
      "
  nginx:
    container_name: bazpos_nginx
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      - app

volumes:
  mysql_data:
  static_files:
  media_files:
